name: 트렌드 데이터 자동 업데이트

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1'
    # 매주 목요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 4'
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 파일 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 데이터 수집 (collect.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python src/collect.py

      - name: 웹사이트 빌드 (build_site.py)
        run: python src/build_site.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/products.json docs/index.html
          git diff --staged --quiet || git commit -m "update: 트렌드 데이터 자동 업데이트 $(date '+%Y-%m-%d')"
          git push
