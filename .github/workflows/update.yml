name: 트렌드 데이터 자동 업데이트

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1'
    # 매주 목요일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 4'
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

concurrency:
  group: update-workflow
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 파일 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (rebase에 필요)

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 데이터 수집 (collect.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python src/collect.py

      - name: 웹사이트 빌드 (build_site.py)
        run: python src/build_site.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json docs/index.html
          if git diff --staged --quiet; then
            echo "변경사항 없음"
            exit 0
          fi
          git commit -m "update: 트렌드 데이터 자동 업데이트 $(date '+%Y-%m-%d')"
          set +e
          git push
          PUSH_RESULT=$?
          set -e
          if [ $PUSH_RESULT -ne 0 ]; then
            echo "Push 실패, rebase 후 재시도..."
            git fetch origin main
            git rebase origin/main
            git push
          fi
